name: AEGIS Agent Dispatch

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  pull_request:
    types: [opened, synchronize, review_requested]
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

jobs:
  dispatch:
    name: Dispatch to AEGIS Agent Ecosystem
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    # Only run if PROXY_URL is configured (won't block other CI)
    if: vars.PROXY_URL != ''

    steps:
      - name: Determine event type and payload
        id: classify
        # All untrusted external inputs bound to env vars — never interpolated inline.
        env:
          EVENT_NAME: ${{ github.event_name }}
          WF_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WF_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WF_RUN_ID: ${{ github.event.workflow_run.id }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          EVENT_TYPE=""
          PAYLOAD="{}"

          if [ "$EVENT_NAME" = "workflow_run" ]; then
            if [ "$WF_CONCLUSION" = "failure" ]; then
              EVENT_TYPE="github_ci_failure"
              PAYLOAD=$(jq -n \
                --arg branch "$WF_BRANCH" \
                --arg run_id "$WF_RUN_ID" \
                --arg conclusion "$WF_CONCLUSION" \
                '{"branch": $branch, "run_id": $run_id, "failures": $conclusion}')
            elif [ "$WF_CONCLUSION" = "success" ]; then
              EVENT_TYPE="github_ci_success"
              PAYLOAD=$(jq -n \
                --arg branch "$WF_BRANCH" \
                '{"branch": $branch}')
            fi

          elif [ "$EVENT_NAME" = "pull_request" ]; then
            EVENT_TYPE="github_pr_opened"
            PAYLOAD=$(jq -n \
              --arg title "$PR_TITLE" \
              --arg number "$PR_NUMBER" \
              --arg url "$PR_URL" \
              '{"title": $title, "number": $number, "url": $url}')

          elif [ "$EVENT_NAME" = "issues" ]; then
            EVENT_TYPE="github_issue_opened"
            PAYLOAD=$(jq -n \
              --arg title "$ISSUE_TITLE" \
              --arg number "$ISSUE_NUMBER" \
              --arg body "$ISSUE_BODY" \
              '{"title": $title, "number": $number, "body": $body}')

          elif [ "$EVENT_NAME" = "issue_comment" ]; then
            # Only dispatch if comment mentions @aegis-agent
            if echo "$COMMENT_BODY" | grep -q "@aegis-agent"; then
              EVENT_TYPE="github_pr_comment"
              PAYLOAD=$(jq -n \
                --arg body "$COMMENT_BODY" \
                --arg number "$COMMENT_ISSUE_NUMBER" \
                '{"body": $body, "number": $number}')
            fi
          fi

          echo "event_type=$EVENT_TYPE" >> $GITHUB_OUTPUT
          echo "payload=$PAYLOAD" >> $GITHUB_OUTPUT

      - name: Dispatch to AEGIS constitutional proxy
        if: steps.classify.outputs.event_type != ''
        env:
          PROXY_URL: ${{ vars.PROXY_URL }}
          DISPATCH_EVENT_TYPE: ${{ steps.classify.outputs.event_type }}
          DISPATCH_PAYLOAD: ${{ steps.classify.outputs.payload }}
        run: |
          curl -s -X POST "$PROXY_URL/agents/dispatch" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg event_type "$DISPATCH_EVENT_TYPE" \
              --argjson payload "$DISPATCH_PAYLOAD" \
              '{"event_type": $event_type, "payload": $payload}')" \
            | jq '.results[] | {role, ralph_cycles, is_valid, output: (.output | .[0:500])}'
