name: AEGIS-Ω CI
on:
  push:
    branches: [main, 'claude/*']
  pull_request:
    branches: [main]

jobs:
  ts-gate8:
    name: TypeScript Gate 8 (2733 tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sovereign-omega-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sovereign-omega-v2/package-lock.json
      - run: npm ci
      - name: Gate 1 - JCS
        run: npm run test -- test/unit/jcs.test.ts
      - name: Gate 8 - Full suite
        run: npm run test && npm run typecheck && npm run build

  hub-build:
    name: Hub Build
    runs-on: ubuntu-latest
    needs: [ts-gate8]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hub/package-lock.json
      - name: Build hub
        run: cd hub && npm ci && npm run build
