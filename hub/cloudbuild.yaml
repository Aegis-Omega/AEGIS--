steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/aegis-hub:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/aegis-hub:latest
      - --build-arg
      - VITE_GRANT_SECRET=aegis-omega-v1
      - --build-arg
      - VITE_SUPABASE_URL=https://rwehltdwpsncnwxzkwik.supabase.co
      - --build-arg
      - VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3ZWhsdGR3cHNuY253eHprd2lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4ODAxMzIsImV4cCI6MjA5NTQ1NjEzMn0.TRPorur3ZbaVn_H9yLJJp2Hoi3BXlxeP1qOQRu7pJJg
      - hub/

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, gcr.io/$PROJECT_ID/aegis-hub:$COMMIT_SHA]

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, gcr.io/$PROJECT_ID/aegis-hub:latest]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - aegis-hub
      - --image=gcr.io/$PROJECT_ID/aegis-hub:$COMMIT_SHA
      - --region=europe-west3
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5

images:
  - gcr.io/$PROJECT_ID/aegis-hub:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/aegis-hub:latest
