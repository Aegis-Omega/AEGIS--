steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/aegis-cockpit:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/aegis-cockpit:latest
      - cockpit/
    dir: '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, gcr.io/$PROJECT_ID/aegis-cockpit:$COMMIT_SHA]

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, gcr.io/$PROJECT_ID/aegis-cockpit:latest]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - aegis-cockpit
      - --image=gcr.io/$PROJECT_ID/aegis-cockpit:$COMMIT_SHA
      - --region=europe-west3
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_REGION=europe-west3,CLAUDE_MODEL=claude-sonnet-4-6,RATE_LIMIT_RPM=20

images:
  - gcr.io/$PROJECT_ID/aegis-cockpit:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/aegis-cockpit:latest
